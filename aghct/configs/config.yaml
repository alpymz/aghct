seed: 42
device: cuda

# ---------------------------------------------------------------------------
# Kaggle-specific paths
# ---------------------------------------------------------------------------
kaggle:
  input_dir: /kaggle/input
  working_dir: /kaggle/working
  num_workers: 2              # Kaggle'da 2 yeterli, 4 çok

# ---------------------------------------------------------------------------
# Model
# ---------------------------------------------------------------------------
model:
  name: aghct                 # aghct | unet | transunet
  base_channels: 64
  encoder_scales: 4
  dagm:
    window_size: 8
    num_transformer_layers: 4
    se_reduction_ratio: 16
    num_heads: 8
  dropout: 0.3

# ---------------------------------------------------------------------------
# Dataset
# ---------------------------------------------------------------------------
dataset:
  name: isic                  # isic | drive
  isic:
    root: /kaggle/input/isic-2018
    img_size: 256
    batch_size: 8
  drive:
    root: /kaggle/input/drive-digital-retinal-images
    img_size: 512
    batch_size: 4
    use_green_channel: true

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
training:
  epochs: 200
  low_data_epochs: 300
  optimizer: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-4
  scheduler: cosine
  warmup_epochs: 10
  loss: bce_dice
  grad_clip: 1.0
  amp: true                   # mixed precision (T4 destekler)

# Low-data ablation: % of labeled data to use
data_fractions: [0.1, 0.25, 0.5, 1.0]

# ---------------------------------------------------------------------------
# Contrastive Pre-training (SimCLR)
# ---------------------------------------------------------------------------
pretrain:
  enabled: true
  framework: simclr
  epochs: 100
  batch_size: 128             # T4 16 GB için güvenli (256→128)
  temperature: 0.1
  projection_dim: 128
  lr: 3.0e-4
  weight_decay: 1.0e-4

# ---------------------------------------------------------------------------
# Cross-validation
# ---------------------------------------------------------------------------
cv_folds: 5

# ---------------------------------------------------------------------------
# Checkpoint & Logging
# ---------------------------------------------------------------------------
checkpoint:
  save_dir: /kaggle/working/checkpoints
  resume: true
  save_every: 5
  save_best: true

logging:
  tensorboard: true
  log_dir: /kaggle/working/logs
  results_dir: /kaggle/working/results
  print_every: 10
